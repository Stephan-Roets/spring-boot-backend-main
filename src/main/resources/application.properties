# ============================================
# ToDo App - Application Configuration
# ============================================

spring.application.name=todo-app-backend
server.port=8080

# ============================================
# Tomcat / HTTP Settings
# ============================================
server.max-http-request-header-size=65536
server.tomcat.max-http-header-size=65536
server.tomcat.max-swallow-size=2097152

# ============================================
# Database (Supabase PostgreSQL)
# ============================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/todoapp}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# JWT Configuration
# ============================================
app.jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-me-in-production-please}
app.jwt.access-token-expiry-ms=86400000
app.jwt.verification-token-expiry-ms=1800000

# ============================================
# Email Configuration (Brevo API)
# ============================================
# Get your API key from https://app.brevo.com/settings/keys/api
# ⚠️ IMPORTANT: Set BREVO_API_KEY environment variable in Railway (production)
# For local development, set in application-local.properties or as env var
# Free tier: 300 emails/day
brevo.api.key=${BREVO_API_KEY}
brevo.from.email=${BREVO_FROM_EMAIL}
brevo.from.name=${BREVO_FROM_NAME:ToDo App}

# ============================================
# Frontend URL (for verification links)
# ============================================
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ============================================
# CORS
# ============================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
